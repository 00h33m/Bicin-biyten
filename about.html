<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бичил талх - Дараагийн хуудас</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #17409a, #243b5a, #3b4f6d);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .box {
      max-width: 700px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    h1 span {
      color: #38bdf8;
    }

    p {
      font-size: 20px;
      line-height: 1.7;
      color: #dbeafe;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 30px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      margin: 10px;
    }

    .btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Манай <span>танилцуулга</span></h1>
    <p>
      Энэ хуудсанд бид бичил талх, sourdough бүтээгдэхүүн,
      хийх арга, орц найрлага болон амттай санаануудаа хуваалцана.
    </p>

   <a href="index.html" class="btn">Нүүр хуудас</a>
<a href="products.html" class="btn">Бүтээгдэхүүн</a>
  </div>
</body>
</html>

<style>body {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}</style>
