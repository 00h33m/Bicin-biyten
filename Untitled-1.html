<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Бичил биетэн</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: white;
      min-height: 100vh;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    nav h1 {
      color: #38bdf8;
      font-size: 28px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h2 {
      font-size: 50px;
      margin-bottom: 15px;
    }

    .hero h2 span {
      color: #38bdf8;
    }

    .hero p {
      max-width: 600px;
      margin: 0 auto 25px;
      color: #cbd5e1;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #38bdf8;
      color: #0f172a;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 40px 8%;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 18px;
    }

    .card h3 {
      color: #38bdf8;
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

  <nav>
    <h1>Бичил биетэн</h1>
    <ul>
     
    </ul>
  </nav>

  <section class="hero">
    <h2> Бичил <span>Талх</span></h2>
    <p>
      та sourdough буюу исгэсэн хөрөнгөөр хийсэн талх, bakery бүтээгдэхүүний жоруудыг эндээс харах боломжтой. Энд бид өөрсдийн талх хийсэн арга, амттай жоруудыг хуваалцах болно.
    </p>
    <a href="about.html" class="btn">ЭХЛЭХ</a>
  </section>

  

  <footer>
    <p>© 2026 Бичил биетэн. All rights reserved.</p>
  </footer>

</body>
</html>

<style>body {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}</style>
