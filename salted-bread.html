<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salted bread</title>
  <style>
    
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #0b1a3a, #243b5a, #3b4f6d);
      color:white;
      min-height:100vh;
      padding:40px 20px;
    }

    .container{
      max-width:1000px;
      margin:0 auto;
      background:rgba(255,255,255,0.08);
      border-radius:25px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .container img{
      width:100%;
      max-height:500px;
      object-fit:cover;
      display:block;
    }

    .content{
      padding:30px;
    }

    h1{
      font-size:48px;
      color:#38bdf8;
      margin-bottom:20px;
    }

    p{
      font-size:22px;
      line-height:1.8;
      color:#e2e8f0;
      margin-bottom:15px;
    }

    .btn{
      display:inline-block;
      margin-top:20px;
      padding:14px 28px;
      background:#38bdf8;
      color:#0f172a;
      text-decoration:none;
      border-radius:30px;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="container">
     <img src="images/salted-bread.jpg" alt="Salted bread">
    <div class="content">
      <h1>Salted bread</h1>
      <p>
        Орц: 4гр хөрөнгө, 195гр ус, 12гр элсэн чихэр, 300гр гурил, 6гр давс, 15гр цөцгийн тос.
      </p>
      <p>
        Энэ бол зөөлөн бүтэцтэй, дээрээсээ бага зэрэг давстай амттай талх юм.
      </p>
      <p>
        Хийх арга: Бүх орцоо хольж зуураад, амрааж, хэвэнд оруулж,
        200 градуст 12–14 минут шарна.
      </p>

      <a href="products.html" class="btn">Буцах</a>
    </div>
  </div>
</body>
</html>
